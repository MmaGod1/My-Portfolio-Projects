i<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="A simple quuz game" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <!-- Start Screen -->
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your job readiness with these quizes.</p>
        <button id="start-btn">Start quiz</button>
      </div>

      <!-- Quiz Screen -->
      <div class="screen" id="quiz-screen">
        <h2 id="question">Questions</h2>

        <div class="answer-info">
          <p>
            Question <span id="current-question">0</span> out of
            <span id="total-question">0</span>
          </p>
          <p>Score: <span id="score">0</span></p>
        </div>

        <div class="answer-container">
          <button class="answer-option"></button>
          <button class="answer-option"></button>
          <button class="answer-option"></button>
          <button class="answer-option"></button>
        </div>

        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <!-- Result Screen -->
      <div class="screen" id="result-screen">
        <h2>Quiz Result</h2>
        <div id="result-info">
          <p>You got <span id="total-score">0</span> out of 5</p>
          <h3 id="comment"></h3>
        </div>

        <button id="restart-quiz">Restart Quiz!</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
